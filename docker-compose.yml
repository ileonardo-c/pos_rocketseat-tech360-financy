services:
  postgres:
    image: postgres:16-alpine
    container_name: financy-postgres
    environment:
      POSTGRES_DB: financy
      POSTGRES_USER: financy_user
      POSTGRES_PASSWORD: financy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financy_user -d financy"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: financy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: financy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin123 && mc mb --ignore-existing local/financy"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: financy-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://financy_user:financy_password@postgres:5432/financy
      JWT_SECRET: changeme
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin123
      S3_BUCKET: financy
      S3_FORCE_PATH_STYLE: true
    ports:
      - "4000:4000"
    command: pnpm --filter backend dev
    volumes:
      - .:/app
    working_dir: /app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: financy-frontend
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: http://localhost:4000/graphql
    ports:
      - "5173:5173"
    command: pnpm --filter frontend dev -- --host 0.0.0.0 --port 5173
    volumes:
      - .:/app
    working_dir: /app

volumes:
  postgres_data:
  minio_data:
