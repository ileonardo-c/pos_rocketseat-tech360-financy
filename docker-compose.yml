services:
  postgres:
    image: postgres:16.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financy}
      POSTGRES_USER: ${POSTGRES_USER:-financy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financy_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financy_user} -d ${POSTGRES_DB:-financy}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - financy_net

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173,http://host.docker.internal:5173,http://frontend:5173}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      financy_net:
        aliases:
          - s3.internal

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} && mc mb --ignore-existing local/${MINIO_BUCKET:-financy} && mc anonymous set download local/${MINIO_BUCKET:-financy}"
    networks:
      - financy_net

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - financy_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    depends_on:
      frontend-deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm/store
      DATABASE_URL: postgresql://${POSTGRES_USER:-financy_user}:${POSTGRES_PASSWORD:-financy_password}@postgres:5432/${POSTGRES_DB:-financy}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173,http://host.docker.internal:5173}
      AWS_S3_ENDPOINT_INTERNAL: ${AWS_S3_ENDPOINT_INTERNAL:-http://s3.internal:9000}
      AWS_S3_ENDPOINT_PUBLIC: ${AWS_S3_ENDPOINT_PUBLIC:-http://localhost:9000}
      S3_PUBLIC_ORIGIN_HOSTS: ${S3_PUBLIC_ORIGIN_HOSTS:-localhost,127.0.0.1,host.docker.internal}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin123}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-financy}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-true}
      AWS_S3_URL_EXPIRES_IN: ${AWS_S3_URL_EXPIRES_IN:-900}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@financy.local}
      RESET_CODE_TTL_SECONDS: ${RESET_CODE_TTL_SECONDS:-900}
      RESET_CODE_MAX_ATTEMPTS: ${RESET_CODE_MAX_ATTEMPTS:-5}
      RESET_CODE_REQUEST_COOLDOWN_SECONDS: ${RESET_CODE_REQUEST_COOLDOWN_SECONDS:-60}
      RESET_CODE_PEPPER: ${RESET_CODE_PEPPER:-financy-reset-pepper}
      RATE_LIMIT_GLOBAL_MAX_REQUESTS: ${RATE_LIMIT_GLOBAL_MAX_REQUESTS:-120}
      RATE_LIMIT_GLOBAL_WINDOW_MS: ${RATE_LIMIT_GLOBAL_WINDOW_MS:-60000}
      RATE_LIMIT_AUTH_MAX_REQUESTS: ${RATE_LIMIT_AUTH_MAX_REQUESTS:-30}
      RATE_LIMIT_AUTH_WINDOW_MS: ${RATE_LIMIT_AUTH_WINDOW_MS:-60000}
    ports:
      - "4000:4000"
    restart: unless-stopped
    command: sh -lc "CI=1 pnpm --filter @financy/backend prisma:generate && pnpm --filter @financy/backend exec prisma migrate deploy && pnpm --filter @financy/backend exec prisma db seed && pnpm --filter @financy/backend dev"
    volumes:
      - .:/app:rw
      - pnpm_store_dev:/pnpm/store
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health/live').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - financy_net

  frontend-deps:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app
    environment:
      PNPM_STORE_DIR: /pnpm/store
    command: sh -lc "CI=1 pnpm install --frozen-lockfile"
    volumes:
      - .:/app:rw
      - pnpm_store_dev:/pnpm/store
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
      - frontend_node_modules:/app/frontend/node_modules
    networks:
      - financy_net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
      frontend-deps:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm/store
      VITE_INTERNAL_BACKEND_URL: http://backend:4000
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-localhost,127.0.0.1,host.docker.internal,frontend}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    restart: unless-stopped
    command: sh -lc "pnpm --filter @financy/frontend dev --host 0.0.0.0 --port 5173"
    volumes:
      - .:/app:rw
      - pnpm_store_dev:/pnpm/store
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - financy_net

  e2e:
    build:
      context: .
      dockerfile: frontend/Dockerfile.e2e
    profiles:
      - e2e
    working_dir: /app
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      PNPM_STORE_DIR: /pnpm/store
      E2E_APP_URL: http://frontend:5173
      E2E_API_URL: http://backend:4000/graphql
      E2E_API_HOST: backend
      E2E_SEED_NAME: ${E2E_SEED_NAME:-Financy Admin}
      E2E_SEED_EMAIL: ${E2E_SEED_EMAIL:-admin@financy.local}
      E2E_SEED_PASSWORD: ${E2E_SEED_PASSWORD:-TestAdmin123!}
      E2E_SEED_AVATAR_PATH: ${E2E_SEED_AVATAR_PATH:-./frontend/tests/e2e/fixtures/seed-avatar.png}
      E2E_SEED_SKIP_AVATAR_SETUP: ${E2E_SEED_SKIP_AVATAR_SETUP:-false}
      E2E_SEED_DRY_RUN: ${E2E_SEED_DRY_RUN:-false}
      E2E_SEED_MONTH_ONLY: ${E2E_SEED_MONTH_ONLY:-true}
      E2E_SEED_DAYS_OFFSET: ${E2E_SEED_DAYS_OFFSET:-0}
      E2E_SEED_TRANSACTIONS_PER_PAGE: ${E2E_SEED_TRANSACTIONS_PER_PAGE:-50}
      CI: "true"
    command: sh -lc "pnpm e2e:journey"
    volumes:
      - .:/app:rw
      - pnpm_store_dev:/pnpm/store
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
    networks:
      - financy_net

volumes:
  postgres_data_dev:
  minio_data_dev:
  mailpit_data:
  pnpm_store_dev:
  root_node_modules:
  backend_node_modules:
  frontend_node_modules:

networks:
  financy_net:
    driver: bridge
