services:
  postgres:
    image: postgres:16.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financy}
      POSTGRES_USER: ${POSTGRES_USER:-financy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financy_password}
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financy_user} -d ${POSTGRES_DB:-financy}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} && mc mb --ignore-existing local/${MINIO_BUCKET:-financy}"

  backend-init:
    build:
      context: .
      dockerfile: backend/Dockerfile
      cache_from:
        - type=gha,scope=backend
      cache_to:
        - type=gha,scope=backend,mode=max
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm/store
      DATABASE_URL: postgresql://${POSTGRES_USER:-financy_user}:${POSTGRES_PASSWORD:-financy_password}@postgres:5432/${POSTGRES_DB:-financy}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: http://localhost:5173
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: ${MINIO_BUCKET:-financy}
      S3_FORCE_PATH_STYLE: "true"
    command: sh -lc "pnpm --filter @financy/backend exec prisma db push --accept-data-loss"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      cache_from:
        - type=gha,scope=backend
      cache_to:
        - type=gha,scope=backend,mode=max
    depends_on:
      backend-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm/store
      DATABASE_URL: postgresql://${POSTGRES_USER:-financy_user}:${POSTGRES_PASSWORD:-financy_password}@postgres:5432/${POSTGRES_DB:-financy}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: http://localhost:5173
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: ${MINIO_BUCKET:-financy}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "4000:4000"
    command: sh -lc "pnpm --filter @financy/backend dev"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health/live').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      cache_from:
        - type=gha,scope=frontend
      cache_to:
        - type=gha,scope=frontend,mode=max
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PNPM_STORE_DIR: /pnpm/store
      VITE_BACKEND_URL: http://backend:4000
    ports:
      - "5173:5173"
    command: sh -lc "pnpm --filter @financy/frontend build && pnpm --filter @financy/frontend preview --host 0.0.0.0 --port 5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  e2e:
    build:
      context: .
      dockerfile: frontend/Dockerfile.e2e
      cache_from:
        - type=gha,scope=e2e
      cache_to:
        - type=gha,scope=e2e,mode=max
    profiles:
      - e2e
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      PNPM_STORE_DIR: /pnpm/store
      E2E_APP_URL: http://localhost:5173
      E2E_API_URL: http://backend:4000/graphql
      E2E_API_HOST: backend
      CI: "true"
    command: sh -lc "pnpm --filter @financy/frontend test:e2e:smoke"
    network_mode: service:frontend
