name: cleanup-merged-branches

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without deleting branches"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged branches without open PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.payload.repository?.default_branch ?? "main";
            const dryRun = (context.payload.inputs?.dry_run ?? "false") === "true";

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const openHeads = new Set(openPulls.map((pull) => pull.head.ref));

            const closedPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "closed",
              base: defaultBranch,
              per_page: 100,
            });
            const mergedHeads = [
              ...new Set(
                closedPulls
                  .filter(
                    (pull) =>
                      pull.merged_at &&
                      pull.head?.repo?.full_name?.toLowerCase() === `${owner}/${repo}`.toLowerCase(),
                  )
                  .map((pull) => pull.head.ref)
                  .filter((head) => Boolean(head) && head !== defaultBranch),
              ),
            ];

            const deleted = [];
            const skipped = [];

            for (const head of mergedHeads) {
              if (openHeads.has(head)) {
                skipped.push({ head, reason: "branch with open PR" });
                continue;
              }

              try {
                await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${head}`,
                });
              } catch (error) {
                if (error.status === 404) {
                  skipped.push({ head, reason: "branch already removed" });
                  continue;
                }
                throw error;
              }

              const branchInfo = await github.rest.repos.getBranch({
                owner,
                repo,
                branch: head,
              });

              if (branchInfo.data.protected) {
                skipped.push({ head, reason: "protected branch" });
                continue;
              }

              if (dryRun) {
                deleted.push({ head, mode: "dry-run" });
                continue;
              }

              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${head}`,
              });
              deleted.push({ head, mode: "deleted" });
            }

            core.info(`dry_run=${dryRun}`);
            core.info(`branches removed/simulated: ${deleted.length}`);
            core.info(`branches skipped: ${skipped.length}`);

            await core.summary
              .addHeading("Merged branch cleanup")
              .addRaw(`dry_run: ${dryRun}\n\n`)
              .addHeading("Removed (or simulated)", 3)
              .addCodeBlock(
                deleted.length
                  ? deleted.map((item) => `${item.head} (${item.mode})`).join("\n")
                  : "none",
                "text",
              )
              .addHeading("Skipped", 3)
              .addCodeBlock(
                skipped.length
                  ? skipped.map((item) => `${item.head} (${item.reason})`).join("\n")
                  : "none",
                "text",
              )
              .write();
