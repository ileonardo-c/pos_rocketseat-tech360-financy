name: docker-verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-verification:
    name: Verify ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target:
          - backend-api-contract
          - backend-auth-regression
          - e2e-smoke-contract
          - e2e-journey-preview
    env:
      PROJECT_NAME: financy-ci-${{ matrix.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean previous CI compose stack
        run: docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml down -v --remove-orphans

      - name: Build and start CI compose stack
        run: docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml up -d --build --wait --wait-timeout 120

      - name: Wait for backend
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if curl --fail --silent --show-error http://127.0.0.1:4000/health/ready >/dev/null; then
              exit 0
            fi
            echo "Backend not ready yet (attempt ${attempt}/3)"
            sleep 15
          done
          echo "Backend did not respond at /health/ready after 3 attempts"
          exit 1

      - name: Wait for frontend
        if: startsWith(matrix.target, 'e2e-')
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if curl --fail --silent --show-error http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            echo "Frontend not ready yet (attempt ${attempt}/3)"
            sleep 15
          done
          echo "Frontend did not respond after 3 attempts"
          exit 1

      - name: Validate pnpm runtime toolchain
        run: |
          set -euo pipefail
          docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml exec -T backend sh -lc "pnpm --version && pnpm --filter @financy/backend exec prisma --version >/dev/null"
          docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml exec -T frontend sh -lc "pnpm --version && pnpm --filter @financy/frontend exec vite --version >/dev/null"

      - name: Validate application builds
        if: startsWith(matrix.target, 'backend-')
        run: |
          set -euo pipefail
          docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml exec -T backend sh -lc "pnpm --filter @financy/backend build"

      - name: Validate frontend build
        if: startsWith(matrix.target, 'e2e-')
        run: |
          set -euo pipefail
          docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml exec -T frontend sh -lc "pnpm --filter @financy/frontend build"

      - name: Run verification target
        id: run_target
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          if [[ "$TARGET" == "backend-api-contract" ]]; then
            docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml exec -T backend sh -lc "pnpm --filter @financy/backend test:api-contract"
            exit 0
          fi
          if [[ "$TARGET" == "backend-auth-regression" ]]; then
            docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml exec -T backend sh -lc "GRAPHQL_URL=http://127.0.0.1:4000/graphql pnpm --filter @financy/backend test:auth-regression"
            exit 0
          fi
          if [[ "$TARGET" == "e2e-smoke-contract" ]]; then
            docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml --profile e2e run --name "${PROJECT_NAME}-e2e" e2e sh -lc "pnpm test:e2e:smoke-contract"
            exit 0
          fi
          if [[ "$TARGET" == "e2e-journey-preview" ]]; then
            docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml --profile e2e run --name "${PROJECT_NAME}-e2e" e2e sh -lc "pnpm e2e:journey"
            exit 0
          fi
          echo "Unsupported target: $TARGET"
          exit 1

      - name: Collect E2E artifacts from container
        if: startsWith(matrix.target, 'e2e-') && always()
        run: |
          set -euo pipefail
          mkdir -p "frontend/.artifacts/${{ matrix.target }}"
          if [ -d "frontend/playwright-report" ]; then
            rm -rf "frontend/.artifacts/${{ matrix.target }}/playwright-report"
            cp -R "frontend/playwright-report" "frontend/.artifacts/${{ matrix.target }}/playwright-report"
          fi
          if [ -d "frontend/test-results" ]; then
            rm -rf "frontend/.artifacts/${{ matrix.target }}/test-results"
            cp -R "frontend/test-results" "frontend/.artifacts/${{ matrix.target }}/test-results"
          fi

      - name: Upload E2E artifacts
        if: startsWith(matrix.target, 'e2e-') && always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.target }}
          path: frontend/.artifacts/${{ matrix.target }}
          if-no-files-found: ignore

      - name: Show compose status
        if: always()
        run: docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml ps

      - name: Show compose logs
        if: failure()
        run: |
          docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml logs --no-color backend frontend postgres minio minio-init mailpit

      - name: Tear down compose stack
        if: always()
        run: docker compose --env-file .env.example -p "${PROJECT_NAME}" -f docker-compose.yml down -v
