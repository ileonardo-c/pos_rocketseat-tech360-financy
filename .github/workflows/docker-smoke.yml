name: docker-smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy environment file
        run: cp .env.example .env

      - name: Build and start development compose stack
        run: docker compose -p financy-dev -f docker-compose.development.yml up -d --build

      - name: Wait for backend readiness
        run: |
          set -euo pipefail
          for _ in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:4000/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not respond at /health/ready after 120s"
          exit 1

      - name: Wait for frontend
        run: |
          set -euo pipefail
          for _ in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not respond after 120s"
          exit 1

      - name: Run E2E smoke flow
        run: docker compose -p financy-dev -f docker-compose.development.yml --profile e2e run --rm e2e

      - name: Run auth smoke flow
        run: docker compose -p financy-dev -f docker-compose.development.yml exec -T backend sh -lc "GRAPHQL_URL=http://127.0.0.1:4000/graphql node scripts/auth-regression.mjs"

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Show compose status
        if: always()
        run: docker compose -p financy-dev -f docker-compose.development.yml ps

      - name: Show compose logs
        if: failure()
        run: docker compose -p financy-dev -f docker-compose.development.yml logs --no-color

      - name: Tear down compose stack
        if: always()
        run: docker compose -p financy-dev -f docker-compose.development.yml down -v

