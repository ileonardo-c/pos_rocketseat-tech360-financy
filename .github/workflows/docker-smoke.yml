name: docker-smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy environment file
        run: cp .env.example .env

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start CI compose stack
        run: docker compose -p financy-ci -f docker-compose.ci.yml up -d --build --wait --wait-timeout 120

      - name: Wait for backend readiness
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if curl --fail --silent --show-error http://127.0.0.1:4000/health/ready >/dev/null; then
              exit 0
            fi
            echo "Backend not ready yet (attempt ${attempt}/3)"
            sleep 15
          done
          echo "Backend did not respond at /health/ready after 3 attempts"
          exit 1

      - name: Wait for frontend
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if curl --fail --silent --show-error http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            echo "Frontend not ready yet (attempt ${attempt}/3)"
            sleep 15
          done
          echo "Frontend did not respond after 3 attempts"
          exit 1

      - name: Validate pnpm runtime toolchain
        run: |
          set -euo pipefail
          docker compose -p financy-ci -f docker-compose.ci.yml exec -T backend sh -lc "pnpm --version && pnpm --filter @financy/backend exec prisma --version >/dev/null"
          docker compose -p financy-ci -f docker-compose.ci.yml exec -T frontend sh -lc "pnpm --version && pnpm --filter @financy/frontend exec vite --version >/dev/null"

      - name: Run E2E smoke flow
        run: docker compose -p financy-ci -f docker-compose.ci.yml --profile e2e run --name financy-ci-e2e-smoke e2e

      - name: Collect E2E artifacts from container
        if: always()
        run: |
          set -euo pipefail
          rm -rf frontend/playwright-report frontend/test-results
          mkdir -p frontend
          if docker ps -a --format '{{.Names}}' | grep -qx 'financy-ci-e2e-smoke'; then
            if docker exec financy-ci-e2e-smoke test -d /app/frontend/playwright-report; then
              docker cp financy-ci-e2e-smoke:/app/frontend/playwright-report frontend/playwright-report
            fi
            if docker exec financy-ci-e2e-smoke test -d /app/frontend/test-results; then
              docker cp financy-ci-e2e-smoke:/app/frontend/test-results frontend/test-results
            fi
          fi

      - name: Run auth smoke flow
        run: docker compose -p financy-ci -f docker-compose.ci.yml exec -T backend sh -lc "GRAPHQL_URL=http://127.0.0.1:4000/graphql node scripts/auth-regression.mjs"

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Show compose status
        if: always()
        run: docker compose -p financy-ci -f docker-compose.ci.yml ps

      - name: Show compose logs
        if: failure()
        run: |
          docker compose -p financy-ci -f docker-compose.ci.yml logs --no-color backend backend-init frontend postgres minio

      - name: Tear down compose stack
        if: always()
        run: docker compose -p financy-ci -f docker-compose.ci.yml down -v

