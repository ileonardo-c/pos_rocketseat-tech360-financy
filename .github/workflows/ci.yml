name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (changed files)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.md' '*.yml' '*.yaml')
          if [ -z "$CHANGED_FILES" ]; then
            echo "Nenhum arquivo elegível para Biome foi alterado."
            exit 0
          fi

          echo "Arquivos validados pelo Biome:"
          echo "$CHANGED_FILES"
          pnpm exec biome check $CHANGED_FILES

      - name: Generate Prisma client
        run: pnpm --filter @financy/backend prisma:generate

      - name: Build backend
        run: pnpm build:backend

      - name: Smoke test backend runtime
        run: |
          set -euo pipefail
          export PORT=4100
          export JWT_SECRET="$(openssl rand -hex 32)"
          export DATABASE_URL=postgresql://localhost:5432/financy
          pnpm --filter backend start &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
            wait "$SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:4100/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend nao respondeu /health em 30s"
          exit 1

      - name: Build frontend
        run: pnpm build:frontend
