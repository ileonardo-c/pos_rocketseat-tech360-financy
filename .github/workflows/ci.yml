name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend prisma:generate

      - name: Build backend
        run: pnpm build:backend

      - name: Smoke test backend runtime
        run: |
          set -euo pipefail
          export PORT=4100
          export JWT_SECRET="$(openssl rand -hex 32)"
          export DATABASE_URL=postgresql://localhost:5432/financy
          pnpm --filter backend start &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
            wait "$SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:4100/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend nao respondeu /health em 30s"
          exit 1

      - name: Build frontend
        run: pnpm build:frontend
