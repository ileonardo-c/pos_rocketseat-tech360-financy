name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (changed files)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          mapfile -t CHANGED_FILES < <(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA" -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.md')
          if [ "${#CHANGED_FILES[@]}" -eq 0 ]; then
            echo "No Biome-eligible files changed."
            exit 0
          fi

          BIOME_FILES=()
          for file in "${CHANGED_FILES[@]}"; do
            case "$file" in
              backend/*|frontend/*|biome.json|package.json)
                BIOME_FILES+=("$file")
                ;;
            esac
          done

          if [ "${#BIOME_FILES[@]}" -eq 0 ]; then
            echo "No changed files are in the Biome validation scope."
            exit 0
          fi

          echo "Files validated by Biome:"
          printf '%s\n' "${BIOME_FILES[@]}"
          pnpm exec biome check --no-errors-on-unmatched "${BIOME_FILES[@]}"

      - name: Generate Prisma client
        run: pnpm --filter @financy/backend prisma:generate

      - name: Build backend
        run: pnpm build:backend

      - name: Smoke test backend runtime
        run: |
          set -euo pipefail
          export PORT=4100
          export JWT_SECRET="$(openssl rand -hex 32)"
          export DATABASE_URL=postgresql://localhost:5432/financy
          export AWS_S3_ENDPOINT_INTERNAL=http://127.0.0.1:9000
          export AWS_S3_ENDPOINT_PUBLIC=http://127.0.0.1:9000
          export S3_PUBLIC_ORIGIN_HOSTS=localhost,127.0.0.1
          export AWS_REGION=us-east-1
          export AWS_ACCESS_KEY_ID=minioadmin
          export AWS_SECRET_ACCESS_KEY=minioadmin123
          export AWS_S3_BUCKET=financy
          export AWS_S3_FORCE_PATH_STYLE=true
          export AWS_S3_URL_EXPIRES_IN=900
          pnpm --filter @financy/backend start &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
            wait "$SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:4100/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not respond to /health within 30s"
          exit 1

      - name: Build frontend
        run: pnpm build:frontend
