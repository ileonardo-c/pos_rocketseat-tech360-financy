services:
  postgres:
    image: postgres:16.3-alpine
    container_name: financy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financy}
      POSTGRES_USER: ${POSTGRES_USER:-financy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financy_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financy_user} -d ${POSTGRES_DB:-financy}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: financy-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: financy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} && mc mb --ignore-existing local/${MINIO_BUCKET:-financy}"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: financy-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-financy_user}:${POSTGRES_PASSWORD:-financy_password}@postgres:5432/${POSTGRES_DB:-financy}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: ${MINIO_BUCKET:-financy}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "4000:4000"
    command: >
      /bin/sh -c "pnpm --filter @financy/backend build &&
      pnpm --filter @financy/backend start"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health/live').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: financy-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
    ports:
      - "5173:5173"
    command: >
      /bin/sh -c "pnpm --filter @financy/frontend build &&
      pnpm --filter @financy/frontend preview --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  minio_data:
